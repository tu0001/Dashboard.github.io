<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩叶与辉夜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a1a;
            width: 100vw;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 10vh;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        button {
            font-size: 22px;
            padding: 14px 28px;
            border-radius: 12px;
            background: #fff;
            border: none;
            cursor: pointer;
        }
        #text {
            font-size: 28px;
            color: #fff;
            font-weight: bold;
            margin-top: 20px;
        }
        .snow {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="btn-group">
        <button onclick="show1()">彩叶是1</button>
        <button onclick="show2()">辉夜是1</button>
    </div>
    <div id="text"></div>

    <script>
        function show1(){
            document.getElementById("text").textContent = "彩叶是1是对的";
        }
        function show2(){
            document.getElementById("text").textContent = "辉夜是2是对的";
        }
        // 雪花效果
        for(let i=0;i<120;i++){
            let s = document.createElement("div");
            s.className = "snow";
            s.style.cssText = `left:${Math.random()*100}vw;top:${Math.random()*100}vh;width:${Math.random()*1.5+0.5}px;height:${Math.random()*1.5+0.5}px;animation:s${i} ${Math.random()*10+10}s linear infinite`;
            document.body.appendChild(s);
            let style = document.createElement('style');
            style.innerHTML = `@keyframes s${i}{to{transform:translateY(110vh)}}`;
            document.head.appendChild(style);
        }
    </script>
</body>
</html>
