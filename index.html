<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩叶与辉夜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 这里用相对路径，图片和index.html放在同一文件夹 */
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 10vh;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        button {
            font-size: 22px;
            padding: 14px 28px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.05);
        }
        #text {
            font-size: 28px;
            color: #fff;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }
        .snow {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="btn-group">
        <button onclick="show1()">彩叶是1</button>
        <button onclick="show2()">辉夜是1</button>
    </div>
    <div id="text"></div>

    <script>
        function show1(){
            document.getElementById("text").textContent = "彩叶是1是对的";
        }
        function show2(){
            document.getElementById("text").textContent = "辉夜是1是错的";
        }
        // 雪花飘落效果
        for(let i=0;i<120;i++){
            let s = document.createElement("div");
            s.className = "snow";
            let size = Math.random()*2 + 1;
            s.style.width = s.style.height = size + "px";
            s.style.left = Math.random()*100 + "vw";
            s.style.top = Math.random()*100 + "vh";
            s.style.animation = `snow${i} ${Math.random()*10 + 10}s linear infinite`;
            document.body.appendChild(s);
            let style = document.createElement('style');
            style.innerHTML = `@keyframes snow${i}{to{transform:translateY(110vh)}}`;
            document.head.appendChild(style);
        }
    </script>
</body>
</html>
