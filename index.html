<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩叶与辉夜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 10vh;
            color: white;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            font-size: 22px;
            padding: 14px 28px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            cursor: pointer;
        }
        #text {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            margin-top: 20px;
        }
        .snow {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
        }
        #musicBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<button id="musicBtn">🔊</button>

<div class="btn-group">
    <button onclick="show1()">彩叶是1</button>
    <button onclick="show2()">辉夜是1</button>
</div>
<div id="text">加载统计中...</div>

<audio id="bgMusic" loop style="display:none;">
    <source src="bgm.mp3" type="audio/mpeg">

<script>
const API = "https://api.countapi.xyz";
const SPACE = "caiye-huiye-click-2026";

// 带超时的请求，防止卡死
async function fetchWithTimeout(url, timeout = 5000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);
  try {
    const response = await fetch(url, { signal: controller.signal });
    clearTimeout(id);
    return response;
  } catch (e) {
    clearTimeout(id);
    throw e;
  }
}

// 加载并显示统计
async function loadStats() {
  try {
    let r1 = await fetchWithTimeout(`${API}/get/${SPACE}/caiye`);
    let d1 = await r1.json();
    let r2 = await fetchWithTimeout(`${API}/get/${SPACE}/huiye`);
    let d2 = await r2.json();
    let c = d1.value || 0;
    let h = d2.value || 0;
    document.getElementById("text").innerText =
      `彩叶是1：${c} 次 | 辉夜是1：${h} 次`;
  } catch (e) {
    document.getElementById("text").innerText = "加载失败，请稍后重试";
    console.error(e);
  }
}

// 按钮1：彩叶是1
async function show1() {
  document.getElementById("text").textContent = "彩叶是1是对的";
  try {
    await fetchWithTimeout(`${API}/hit/${SPACE}/caiye`);
    // 2秒后切回统计显示
    setTimeout(loadStats, 2000);
  } catch (e) {
    console.error(e);
  }
}

// 按钮2：辉夜是1
async function show2() {
  document.getElementById("text").textContent = "辉夜是1是错的";
  try {
    await fetchWithTimeout(`${API}/hit/${SPACE}/huiye`);
    // 2秒后切回统计显示
    setTimeout(loadStats, 2000);
  } catch (e) {
    console.error(e);
  }
}

// 页面加载时先显示统计
loadStats();

// 雪花效果
for(let i=0;i<120;i++){
  let s = document.createElement("div");
  s.className = "snow";
  let size = Math.random()*3 + 1;
  s.style.width = size+"px";
  s.style.height = size+"px";
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  s.style.position = "fixed";
  s.style.animation = `fall ${Math.random()*5+5}s linear infinite`;
  document.body.appendChild(s);
}

let st = document.createElement("style");
st.innerHTML = "@keyframes fall { to { transform: translateY(110vh); } }";
document.head.appendChild(st);

// 音乐控制
const audio = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");
let playing = false;

document.addEventListener("click", ()=>{
  if(!playing){
    audio.play();
    playing = true;
    btn.innerText = "🔊";
  }
});

btn.onclick = ()=>{
  if(playing){
    audio.pause();
    btn.innerText = "🔇";
    playing = false;
  }else{
    audio.play();
    btn.innerText = "🔊";
    playing = true;
  }
};
</script>

</body>
</html>
