<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>彩叶 · 辉夜 | 叶月之境</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            /* 强制背景图优先，CSS直接加载，不依赖JS */
            background: url('background.jpg') no-repeat center center / cover !important;
            background-color: #0B1120; /* 兜底色，防止图加载失败 */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 12vh;
            position: relative;
        }
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(255, 200, 150, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .glass-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent);
            pointer-events: none;
            z-index: 1;
        }
        .btn-group {
            display: flex;
            gap: 32px;
            justify-content: center;
            z-index: 20;
            position: relative;
            margin-bottom: 20px;
        }
        button {
            font-size: 1.35rem;
            font-weight: 500;
            padding: 14px 36px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            font-family: inherit;
            color: #F3F4F6;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        button:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 215, 150, 0.5);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }
        button:active { transform: translateY(1px); transition: 0.05s; }
        #btnCaiye:hover {
            box-shadow: 0 8px 25px rgba(255, 140, 70, 0.3);
            border-color: rgba(255, 160, 100, 0.6);
        }
        #btnKaguya:hover {
            box-shadow: 0 8px 25px rgba(140, 120, 255, 0.3);
            border-color: rgba(170, 150, 255, 0.6);
        }
        #text {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 500;
            color: rgba(255, 255, 245, 0.95);
            text-shadow: 0 2px 15px rgba(0,0,0,0.4), 0 0 20px rgba(255, 200, 100, 0.3);
            margin-top: 28px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(24px);
            padding: 14px 36px;
            border-radius: 80px;
            z-index: 20;
            position: relative;
            min-width: 260px;
            text-align: center;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.2s ease;
        }
        .corner-btn {
            position: fixed;
            top: 24px;
            background: rgba(15, 20, 30, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            color: rgba(255, 250, 240, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            z-index: 100;
            transition: all 0.25s;
            font-weight: 450;
            letter-spacing: 0.5px;
        }
        .corner-btn:hover {
            background: rgba(30, 40, 55, 0.8);
            transform: scale(1.02);
            border-color: rgba(255, 200, 120, 0.5);
        }
        #musicBtn { left: 24px; }
        #videoBtn { right: 24px; }
        .snow {
            position: fixed;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.4));
            border-radius: 50%;
            pointer-events: none;
            will-change: transform;
            filter: blur(0.3px);
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0A0F1A;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.6s ease, visibility 0.6s;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(4px);
        }
        .loader-ring {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(255, 220, 150, 0.25);
            border-top: 2px solid #FFD966;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            color: rgba(255, 245, 210, 0.8);
            font-size: 0.9rem;
            letter-spacing: 3px;
            font-weight: 300;
        }
        @media (max-width: 640px) {
            .btn-group { gap: 18px; }
            button { padding: 10px 24px; font-size: 1.1rem; }
            #text { padding: 10px 24px; margin-top: 20px; }
            .corner-btn { padding: 6px 14px; font-size: 0.75rem; top: 16px; }
            body { padding-bottom: 10vh; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader-ring"></div>
        <div class="loading-text">叶月之境 · 流光待启</div>
    </div>
    <div class="glass-overlay"></div>
    <button id="musicBtn" class="corner-btn">🎵 萦绕之音</button>
    <button id="videoBtn" class="corner-btn">✨ 秘语之扉</button>
    <div class="btn-group">
        <button id="btnCaiye">🍁 彩叶是壹</button>
        <button id="btnKaguya">🌙 辉夜是壹</button>
    </div>
    <div id="text">✦ 轻触，聆听心语 ✦</div>
    <audio id="bgMusic" loop preload="auto" style="display: none;">
        <source src="bgm.mp3" type="audio/mpeg">
    

    <script>
        (function() {
            const textEl = document.getElementById('text');
            const loadingDiv = document.getElementById('loading');

            // 3秒后强制隐藏loading
            setTimeout(() => {
                if (loadingDiv) {
                    loadingDiv.style.opacity = '0';
                    setTimeout(() => loadingDiv.style.display = 'none', 600);
                }
            }, 3000);

            // 按钮逻辑
            document.getElementById('btnCaiye').onclick = () => {
                textEl.textContent = '🍁 彩叶是1是对的 🍁';
                textEl.style.transform = 'scale(1.02)';
                setTimeout(() => textEl.style.transform = 'scale(1)', 120);
                createParticleGlow('#FFA559', 6);
            };
            document.getElementById('btnKaguya').onclick = () => {
                textEl.textContent = '🌙 辉夜是1是错的 🌙';
                textEl.style.transform = 'scale(1.02)';
                setTimeout(() => textEl.style.transform = 'scale(1)', 120);
                createParticleGlow('#9D8CFF', 6);
            };

            // 粒子效果
            function createParticleGlow(color, count = 6) {
                const rect = textEl.getBoundingClientRect();
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.style.cssText = `position:fixed;width:6px;height:6px;background:${color};border-radius:50%;pointer-events:none;z-index:999;filter:blur(2px);opacity:0.7;left:${rect.left + rect.width/2 + (Math.random()-0.5)*60}px;top:${rect.top + rect.height/2 + (Math.random()-0.5)*40}px`;
                    document.body.appendChild(p);
                    let op = 0.7, sz = 6;
                    const ani = () => {
                        op -= 0.035; sz += 1.2;
                        p.style.opacity = op; p.style.width = sz+'px'; p.style.height = sz+'px';
                        p.style.transform = `translateY(-${(1-op)*18}px)`;
                        if(op <= 0) p.remove();
                        else requestAnimationFrame(ani);
                    };
                    requestAnimationFrame(ani);
                }
            }

            // 雪花系统
            const SNOW_COUNT = 55;
            let snowList = [], snowId = null;
            function initSnow() {
                document.querySelectorAll('.snow').forEach(s => s.remove());
                snowList = [];
                for(let i=0;i<SNOW_COUNT;i++){
                    const s = document.createElement('div');
                    s.className = 'snow';
                    const sz = Math.random()*3 + 1.2;
                    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*0.5+0.25}`;
                    document.body.appendChild(s);
                    snowList.push({el:s, x:Math.random()*100, y:Math.random()*100, vY:Math.random()*0.8+0.3, vX:(Math.random()-0.5)*0.2});
                }
                let last = 0;
                function animate(now) {
                    if(!snowList.length) return;
                    if(now - last < 16) { requestAnimationFrame(animate); return; }
                    last = now;
                    snowList.forEach(s => {
                        s.y += s.vY * 0.6; s.x += s.vX * 0.5;
                        if(s.y > 105) { s.y = -5; s.x = Math.random()*100; }
                        if(s.x > 105) s.x = -5; if(s.x < -5) s.x = 105;
                        s.el.style.top = s.y+'%'; s.el.style.left = s.x+'%';
                    });
                    snowId = requestAnimationFrame(animate);
                }
                if(snowId) cancelAnimationFrame(snowId);
                snowId = requestAnimationFrame(animate);
            }

            // 音乐控制
            const bgAudio = document.getElementById('bgMusic');
            const musicBtn = document.getElementById('musicBtn');
            bgAudio.volume = 0.3;
            musicBtn.onclick = () => {
                if(bgAudio.paused) { bgAudio.play(); musicBtn.textContent = "🎵 萦绕之音"; }
                else { bgAudio.pause(); musicBtn.textContent = "🔇 静寂之刻"; }
            };
            let firstClick = () => {
                bgAudio.play(); musicBtn.textContent = "🎵 萦绕之音";
                document.removeEventListener('click', firstClick);
            };
            document.addEventListener('click', firstClick);

            // 视频按钮
            const videoUrl = "https://b23.tv/PKMu7Pw";
            document.getElementById('videoBtn').onclick = (e) => {
                e.stopPropagation();
                e.target.style.transform = 'scale(0.96)';
                setTimeout(() => e.target.style.transform = '', 120);
                const isQQ = /QQ/i.test(navigator.userAgent);
                if(isQQ) {
                    alert(`请复制链接，在浏览器打开：\n${videoUrl}`);
                    navigator.clipboard.writeText(videoUrl);
                } else {
                    window.open(videoUrl, '_blank');
                }
            };

            // 页面加载完成
            window.addEventListener('load', () => {
                if(loadingDiv) {
                    loadingDiv.style.opacity = '0';
                    setTimeout(() => loadingDiv.style.display = 'none', 600);
                }
                initSnow();
                // 文字入场动画
                textEl.style.opacity = '0';
                textEl.style.transform = 'translateY(8px)';
                setTimeout(() => {
                    textEl.style.transition = 'opacity 0.6s ease, transform 0.5s ease';
                    textEl.style.opacity = '1';
                    textEl.style.transform = 'translateY(0)';
                }, 200);
            });

            // 窗口大小重置雪花
            window.addEventListener('resize', () => {
                clearTimeout(window.resizeTimer);
                window.resizeTimer = setTimeout(() => {
                    snowList.forEach(s => {
                        s.x = Math.random()*100; s.y = Math.random()*100;
                        s.el.style.left = s.x+'%'; s.el.style.top = s.y+'%';
                    });
                }, 180);
            });

            // 页面关闭释放资源
            window.addEventListener('beforeunload', () => {
                if(snowId) cancelAnimationFrame(snowId);
            });
        })();
    </script>
</body>
</html>
