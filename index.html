<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩叶与辉夜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
            width: 100vw;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 10vh;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            font-size: 22px;
            padding: 14px 28px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.05);
        }
        #text {
            font-size: 28px;
            color: #fff;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }
        .snow {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }

        /* 低调的音乐开关按钮 - 左上角 */
        #musicBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="loading">加载中...</div>

    <!-- 音乐开关按钮（左上角低调版） -->
    <button id="musicBtn">🔊</button>

    <div class="btn-group">
        <button onclick="show1()">彩叶是1</button>
        <button onclick="show2()">辉夜是1</button>
    </div>
    <div id="text"></div>

    <audio id="bgMusic" loop preload="auto" style="display: none;">
        <source src="bgm.mp3" type="audio/mpeg">
        你的浏览器不支持音频播放
    

    <script>
        function show1(){
            document.getElementById("text").textContent = "彩叶是1是对的";
        }
        function show2(){
            document.getElementById("text").textContent = "辉夜是2是对的";
        }

        // 雪花飘落效果
        for(let i=0;i<120;i++){
            let s = document.createElement("div");
            s.className = "snow";
            let size = Math.random()*2 + 1;
            s.style.width = s.style.height = size + "px";
            s.style.left = Math.random()*100 + "vw";
            s.style.top = Math.random()*100 + "vh";
            s.style.animation = `snow${i} ${Math.random()*10 + 10}s linear infinite`;
            document.body.appendChild(s);
            let style = document.createElement('style');
            style.innerHTML = `@keyframes snow${i}{to{transform:translateY(110vh)}}`;
            document.head.appendChild(style);
        }

        // 隐藏加载提示
        window.onload = function(){
            document.getElementById('loading').style.display = 'none';
        }

        // 音乐控制
        const bgAudio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        bgAudio.volume = 0.3;

        let isPlaying = false;

        // 点击页面后自动播放
        document.addEventListener('click', function playMusic() {
            bgAudio.play();
            isPlaying = true;
            musicBtn.textContent = "🔊";
            document.removeEventListener('click', playMusic);
        });

        // 开关按钮逻辑
        musicBtn.onclick = function () {
            if (isPlaying) {
                bgAudio.pause();
                musicBtn.textContent = "🔇";
                isPlaying = false;
            } else {
                bgAudio.play();
                musicBtn.textContent = "🔊";
                isPlaying = true;
            }
        };
    </script>
</body>
</html>
