<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩叶与辉夜 投票</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 10vh;
            color: white;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            font-size: 22px;
            padding: 14px 28px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            cursor: pointer;
        }
        #text {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }
        .snow {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
        }
        #musicBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<button id="musicBtn">🔊</button>

<div class="btn-group">
    <button onclick="voteCaiye()">投彩叶</button>
    <button onclick="voteHuiye()">投辉夜</button>
</div>
<div id="text">加载票数中...</div>

<audio id="bgMusic" loop style="display:none;">
    <source src="bgm.mp3" type="audio/mpeg">

<script>
const API = "https://api.countapi.xyz";
const SPACE = "caiye-huiye-vote-2026";

// 加载票数
async function loadVotes() {
  let r1 = await fetch(`${API}/get/${SPACE}/caiye`);
  let d1 = await r1.json();
  let r2 = await fetch(`${API}/get/${SPACE}/huiye`);
  let d2 = await r2.json();

  let c = d1.value || 0;
  let h = d2.value || 0;
  document.getElementById("text").innerText = `彩叶：${c} 票 | 辉夜：${h} 票`;
}

// 今天日期标识（用于防刷）
function getTodayKey() {
  let now = new Date();
  return now.getFullYear() + "-" + (now.getMonth()+1) + "-" + now.getDate();
}

// 投彩叶（每日限1次）
async function voteCaiye() {
  let key = "voted_caiye_" + getTodayKey();
  if (localStorage.getItem(key)) {
    alert("你今天已经投过彩叶啦，明天再来~");
    return;
  }

  await fetch(`${API}/hit/${SPACE}/caiye`);
  localStorage.setItem(key, "1");
  loadVotes();
}

// 投辉夜（每日限1次）
async function voteHuiye() {
  let key = "voted_huiye_" + getTodayKey();
  if (localStorage.getItem(key)) {
    alert("你今天已经投过辉夜啦，明天再来~");
    return;
  }

  await fetch(`${API}/hit/${SPACE}/huiye`);
  localStorage.setItem(key, "1");
  loadVotes();
}

loadVotes();

// 雪花
for(let i=0;i<100;i++){
  let s = document.createElement("div");
  s.className = "snow";
  let size = Math.random()*3 + 1;
  s.style.width = size+"px";
  s.style.height = size+"px";
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  s.style.position = "fixed";
  s.style.animation = `fall ${Math.random()*5+5}s linear infinite`;
  document.body.appendChild(s);
}

let st = document.createElement("style");
st.innerHTML = "@keyframes fall { to { transform: translateY(110vh); } }";
document.head.appendChild(st);

// 音乐
const audio = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");
let playing = false;

document.addEventListener("click", ()=>{
  if(!playing){
    audio.play();
    playing = true;
    btn.innerText = "🔊";
  }
});

btn.onclick = ()=>{
  if(playing){
    audio.pause();
    btn.innerText = "🔇";
    playing = false;
  }else{
    audio.play();
    btn.innerText = "🔊";
    playing = true;
  }
};
</script>

</body>
</html>
