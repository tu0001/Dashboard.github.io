<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩叶与辉夜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 10vh;
            color: white;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            font-size: 22px;
            padding: 14px 28px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            cursor: pointer;
        }
        #text {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            margin-top: 20px;
        }
        .snow {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
        }
        #musicBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<button id="musicBtn">🔊</button>

<div class="btn-group">
    <button onclick="show1()">彩叶是1</button>
    <button onclick="show2()">辉夜是1</button>
</div>
<div id="text">加载中...</div>

<audio id="bgMusic" loop style="display:none;">
    <source src="bgm.mp3" type="audio/mpeg">

<script>
// 免费国内稳定云端计数（真正同步）
const BASE = "https://api.xiaomark.com/open/count";
const KEY  = "caiye_huiye_2026";

// 读取当前总次数
async function loadCount() {
  try {
    let res = await fetch(`${BASE}?key=${KEY}`);
    let data = await res.json();
    let num = data.count || 0;
    document.getElementById("text").innerText = `本网站总点击：${num} 次`;
  } catch (e) {
    document.getElementById("text").innerText = "本网站总点击：加载中";
  }
}

// 按钮1：彩叶是1
async function show1() {
  document.getElementById("text").innerText = "彩叶是1是对的";
  await fetch(`${BASE}?key=${KEY}&action=inc`);
  setTimeout(loadCount, 2000);
}

// 按钮2：辉夜是1
async function show2() {
  document.getElementById("text").innerText = "辉夜是1是错的";
  await fetch(`${BASE}?key=${KEY}&action=inc`);
  setTimeout(loadCount, 2000);
}

loadCount();

// 雪花
for(let i=0;i<120;i++){
  let s = document.createElement("div");
  s.className = "snow";
  let size = Math.random()*3 + 1;
  s.style.width = size+"px";
  s.style.height = size+"px";
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  s.style.position = "fixed";
  s.style.animation = `fall ${Math.random()*5+5}s linear infinite`;
  document.body.appendChild(s);
}

let st = document.createElement("style");
st.innerHTML = "@keyframes fall { to { transform: translateY(110vh); } }";
document.head.appendChild(st);

// 音乐
const audio = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");
let playing = false;

document.addEventListener("click", ()=>{
  if(!playing){
    audio.play();
    playing = true;
    btn.innerText = "🔊";
  }
});

btn.onclick = ()=>{
  if(playing){
    audio.pause();
    btn.innerText = "🔇";
    playing = false;
  }else{
    audio.play();
    btn.innerText = "🔊";
    playing = true;
  }
};
</script>

</body>
</html>
